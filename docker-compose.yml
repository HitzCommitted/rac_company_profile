services:
  web:
    build: .
    volumes:
      - static_volume:/app/staticfiles
    env_file: .env
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      # - "8080:80" # TEST 
      - "80:80"
      - "443:443"
    volumes:
      # - ./local.conf:/etc/nginx/conf.d/default.conf # TEST
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt:ro  
      - ./certbot/www:/var/www/certbot        
    depends_on:
      - web

volumes:
  static_volume: